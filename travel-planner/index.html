<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Travel Planner</title>
    <meta
      name="description"
      content="Plan and compare departure times across places. Works offline."
    />
    <meta name="theme-color" content="#f6f8fb" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Travel" />
    <meta name="mobile-web-app-capable" content="yes" />
    <style>
      :root {
        --bg: #0f172a;
        --panel: #1e293b;
        --panel-2: #172033;
        --ink: #f1f5f9;
        --ink-soft: #94a3b8;
        --ink-faint: #64748b;
        --rule: #334155;
        --rule-soft: #26344b;
        --accent: #60a5fa;
        --accent-ink: #0f172a;
        --ppm: 1.4;
        --rail: 54px;
        --pad: 10px;
      }
      [data-theme="light"] {
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-2: #f1f5f9;
        --ink: #0f172a;
        --ink-soft: #475569;
        --ink-faint: #94a3b8;
        --rule: #e2e8f0;
        --rule-soft: #eef2f7;
        --accent: #2563eb;
        --accent-ink: #ffffff;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        font-size: 15px;
        line-height: 1.4;
        -webkit-text-size-adjust: 100%;
      }
      body {
        height: 100dvh;
        overflow: hidden;
      }
      .app {
        max-width: 920px;
        margin: 0 auto;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 30;
        background: color-mix(in srgb, var(--bg) 90%, transparent);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--rule);
        padding: 8px 10px;
      }
      .headerrow {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .iconrow {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .icon {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        padding: 0;
        flex-shrink: 0;
        font: inherit;
        color: var(--ink);
        background: var(--panel);
        border: 1px solid var(--rule);
        border-radius: 9px;
        cursor: pointer;
      }
      .icon svg {
        width: 18px;
        height: 18px;
        stroke: var(--ink-soft);
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .icon:active {
        transform: translateY(1px);
      }

      .chips {
        flex: 1;
        min-width: 0;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 4px 0;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .chips::-webkit-scrollbar {
        display: none;
      }
      .chip {
        flex-shrink: 0;
        border: 1px solid var(--rule);
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        background: var(--panel);
        color: var(--ink-soft);
        cursor: pointer;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .chip .ck {
        width: 14px;
        text-align: center;
        opacity: 0;
      }
      .chip.on {
        background: var(--accent);
        color: var(--accent-ink);
        border-color: var(--accent);
      }
      .chip.on .ck {
        opacity: 1;
      }
      .chip.add {
        background: none;
        border-style: dashed;
        color: var(--ink-soft);
      }

      .scroll {
        flex: 1;
        min-height: 0;
        overflow: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      .track::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-position: 0 var(--pad);
        background-image:
          repeating-linear-gradient(
            to bottom,
            var(--rule-soft) 0,
            var(--rule-soft) 1px,
            transparent 1px,
            transparent calc(var(--ppm) * 15px)
          ),
          repeating-linear-gradient(
            to bottom,
            var(--rule) 0,
            var(--rule) 1px,
            transparent 1px,
            transparent calc(var(--ppm) * 60px)
          );
      }

      .cwrap {
        margin: 8px 0 20px;
      }
      .cgrid {
        display: grid;
        min-width: max-content;
      }
      .chead {
        position: sticky;
        top: 0;
        z-index: 12;
        background: var(--panel);
        border-bottom: 2px solid var(--rule);
        border-right: 1px solid var(--rule);
        padding: 10px 8px;
        text-align: center;
        font-weight: 700;
        font-size: 13.5px;
        cursor: pointer;
      }
      .chead.ctime {
        left: 0;
        z-index: 14;
        width: var(--rail);
        cursor: default;
        color: var(--ink-faint);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .crail {
        position: sticky;
        left: 0;
        z-index: 8;
        background: var(--panel);
        width: var(--rail);
        border-right: 1px solid var(--rule);
      }
      .hr {
        position: absolute;
        right: 8px;
        transform: translateY(-50%);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        color: var(--ink-soft);
        font-weight: 700;
      }
      .hr.half {
        font-size: 10px;
        font-weight: 600;
        color: var(--ink-faint);
      }
      .track {
        position: relative;
        border-right: 1px solid var(--rule);
        min-width: 150px;
      }

      .ev {
        position: absolute;
        border-radius: 8px;
        border: 1px solid;
        border-left-width: 3px;
        padding: 5px 8px;
        overflow: hidden;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .ev:active {
        filter: brightness(1.08);
      }
      .ev .t {
        font-size: 11px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: var(--ink-soft);
      }
      .ev .n {
        font-size: 12.5px;
        font-weight: 700;
        line-height: 1.2;
        word-break: break-word;
        color: var(--ink);
      }
      .ev .note {
        font-size: 11px;
        line-height: 1.2;
        color: var(--ink-soft);
      }
      .ev.short {
        padding: 3px 8px;
      }
      .ev.short .n {
        font-size: 11.5px;
      }
      .ev.point {
        flex-direction: row;
        align-items: center;
        gap: 6px;
        padding: 2px 8px;
        border-radius: 7px;
      }
      .ev.point .t {
        flex-shrink: 0;
      }
      .ev.point .n {
        font-size: 11.5px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nowline {
        position: absolute;
        left: 0;
        right: 0;
        border-top: 2px solid #f43f5e;
        z-index: 6;
        pointer-events: none;
      }
      .nowline::before {
        content: "";
        position: absolute;
        left: -4px;
        top: -5px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f43f5e;
      }
      .empty {
        padding: 64px 24px;
        text-align: center;
        color: var(--ink-faint);
        font-size: 14px;
      }

      .fab {
        position: fixed;
        right: 18px;
        bottom: calc(18px + env(safe-area-inset-bottom));
        z-index: 25;
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        background: var(--accent);
        color: var(--accent-ink);
        border: none;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
      }
      .fab svg {
        display: block;
      }
      .fab:active {
        transform: translateY(1px);
      }

      .scrim {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 40;
        display: none;
      }
      .scrim.open {
        display: block;
      }
      .sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 41;
        background: var(--panel);
        border-top: 1px solid var(--rule);
        border-radius: 16px 16px 0 0;
        padding: 14px 14px 22px;
        max-width: 920px;
        margin: 0 auto;
        transform: translateY(110%);
        transition: transform 0.22s ease;
        max-height: 88dvh;
        overflow-y: auto;
      }
      .sheet.open {
        transform: translateY(0);
      }
      .sheet h2 {
        font-size: 16px;
        margin: 2px 0 12px;
      }
      .field {
        margin-bottom: 11px;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: var(--ink-soft);
        margin-bottom: 4px;
        font-weight: 600;
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        font: inherit;
        color: var(--ink);
        background: var(--panel-2);
        border: 1px solid var(--rule);
        border-radius: 9px;
        padding: 11px;
      }
      .field textarea {
        min-height: 180px;
        resize: vertical;
        font-size: 13px;
        line-height: 1.5;
        font-variant-numeric: tabular-nums;
      }
      .two {
        display: flex;
        gap: 10px;
      }
      .two .field {
        flex: 1;
      }
      .sheetbtns {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }
      .sheetbtns .btn {
        flex: 1;
        padding: 12px;
        text-align: center;
        font: inherit;
        font-weight: 600;
        border-radius: 9px;
        border: 1px solid var(--rule);
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
      }
      .btn.primary {
        background: var(--accent);
        color: var(--accent-ink);
        border-color: var(--accent);
      }
      .btn.danger {
        background: transparent;
        color: #e11d48;
        border-color: #fecdd3;
      }
      .btn.ghost {
        background: transparent;
        color: var(--ink-soft);
      }
      .hint {
        font-size: 11px;
        color: var(--ink-faint);
        margin-top: 10px;
      }
      .seg {
        display: flex;
        gap: 6px;
        margin-bottom: 14px;
      }
      .seg button {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--rule);
        background: var(--panel-2);
        color: var(--ink-soft);
        border-radius: 9px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .seg button.on {
        background: var(--accent);
        color: var(--accent-ink);
        border-color: var(--accent);
      }
      .typerow {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      .typerow input[type="color"] {
        width: 38px;
        height: 38px;
        padding: 0;
        border: 1px solid var(--rule);
        border-radius: 8px;
        background: none;
        flex-shrink: 0;
      }
      .typerow input[type="text"] {
        flex: 1;
        padding: 10px;
        font: inherit;
        color: var(--ink);
        background: var(--panel-2);
        border: 1px solid var(--rule);
        border-radius: 8px;
      }
      .typerow .rm {
        width: 34px;
        height: 38px;
        border: 1px solid var(--rule);
        background: var(--panel-2);
        color: var(--ink-faint);
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
      }
      .addtype {
        width: 100%;
        padding: 10px;
        border: 1px dashed var(--rule);
        background: none;
        color: var(--ink-soft);
        border-radius: 9px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        margin-top: 2px;
      }
      .sub {
        font-size: 12px;
        color: var(--ink-soft);
        font-weight: 700;
        margin: 14px 0 8px;
      }
    </style>
  </head>
  <body data-theme="light">
    <div class="app">
      <header>
        <div class="headerrow">
          <div class="chips" id="chips"></div>
          <div class="iconrow">
            <button class="icon" id="shareBtn" aria-label="Share">
              <svg viewBox="0 0 24 24">
                <circle cx="18" cy="5" r="3" />
                <circle cx="6" cy="12" r="3" />
                <circle cx="18" cy="19" r="3" />
                <path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4" />
              </svg>
            </button>
            <button class="icon" id="settingsBtn" aria-label="Settings">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3" />
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <div class="scroll" id="scroll"><div id="view"></div></div>
      <button class="fab" id="addBtn" aria-label="Add entry">
        <svg
          viewBox="0 0 24 24"
          width="26"
          height="26"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        >
          <path d="M12 5v14M5 12h14" />
        </svg>
      </button>
    </div>

    <div class="scrim" id="scrim"></div>

    <!-- ENTRY -->
    <div class="sheet" id="evSheet">
      <h2 id="evTitle">Add entry</h2>
      <div class="field">
        <label for="fName">Name</label>
        <input
          id="fName"
          type="text"
          placeholder="e.g. Bus to Sulmona"
          autocomplete="off"
        />
      </div>
      <div class="two">
        <div class="field">
          <label for="fType">Type</label
          ><select id="fType"></select>
        </div>
        <div class="field">
          <label for="fPlace">Place</label
          ><select id="fPlace"></select>
        </div>
      </div>
      <div class="two">
        <div class="field">
          <label for="fStart">Departs</label><input id="fStart" type="time" />
        </div>
        <div class="field">
          <label for="fEnd">Arrives (optional)</label
          ><input id="fEnd" type="time" />
        </div>
      </div>
      <div class="field">
        <label for="fNote">Notes (optional)</label>
        <input
          id="fNote"
          type="text"
          placeholder="e.g. ~1h15 · €9 · last one!"
          autocomplete="off"
        />
      </div>
      <div class="sheetbtns">
        <button class="btn danger" id="evDelete" style="display: none">
          Delete
        </button>
        <button class="btn ghost" id="evCancel">Cancel</button>
        <button class="btn primary" id="evSave">Save</button>
      </div>
      <div class="hint">
        Leave “Arrives” blank to just mark a departure time.
      </div>
    </div>

    <!-- PLACE -->
    <div class="sheet" id="placeSheet">
      <h2 id="placeTitle">Add place</h2>
      <div class="field">
        <label for="pLabel">Place name</label>
        <input
          id="pLabel"
          type="text"
          placeholder="e.g. Pescara (PSR)"
          autocomplete="off"
        />
      </div>
      <div class="sheetbtns">
        <button class="btn danger" id="placeDelete" style="display: none">
          Delete place
        </button>
        <button class="btn ghost" id="placeCancel">Cancel</button>
        <button class="btn primary" id="placeSave">Save</button>
      </div>
      <div class="hint">
        Tap a column heading any time to rename or remove a place.
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="sheet" id="setSheet">
      <h2>Settings</h2>
      <div class="sub">Theme</div>
      <div class="seg" id="themeSeg">
        <button data-theme="light">Light</button
        ><button data-theme="dark">Dark</button>
      </div>
      <div class="sub">Types &amp; colours</div>
      <div id="typeList"></div>
      <button class="addtype" id="addType">+ Add type</button>
      <div class="sub">Backup</div>
      <div class="sheetbtns">
        <button class="btn ghost" id="importBtn">Import</button>
        <button class="btn ghost" id="exportBtn">Export backup</button>
      </div>
      <div class="hint">
        Saved on this device only. Export occasionally so a cleared browser
        cache won't lose your plans.
      </div>
      <div class="sheetbtns" style="margin-top: 14px">
        <button class="btn primary" id="setDone">Done</button>
      </div>
    </div>

    <!-- SHARE -->
    <div class="sheet" id="shareSheet">
      <h2>Share</h2>
      <div class="field"><textarea id="shareText" readonly></textarea></div>
      <div class="sheetbtns">
        <button class="btn ghost" id="shareCancel">Close</button>
        <button class="btn primary" id="copyBtn">Copy</button>
      </div>
    </div>

    <input
      type="file"
      id="fileInput"
      accept="application/json"
      style="display: none"
    />

    <script>
      /* ===========================================================================
        DATA  (persisted to localStorage on this device; see load()/save() below)
        Durable storage is requested once on load and an offline service worker
        (sw.js) caches the app shell. All data lives in this browser only, so an
        Export backup is the real safeguard against a cleared cache or new phone.
      =========================================================================== */
      const DAY_MIN = 24 * 60;
      const ppm =
        parseFloat(
          getComputedStyle(document.documentElement).getPropertyValue("--ppm"),
        ) || 1.4;
      // top/bottom breathing room (must match --pad in CSS so labels/gridlines align)
      const PAD =
        parseFloat(
          getComputedStyle(document.documentElement).getPropertyValue("--pad"),
        ) || 10;

      // Bump SCHEMA whenever the persisted shape changes, and add a matching step in
      // migrate() below. Data with no `schema` predates this field and counts as 0.
      const SCHEMA = 1;
      function seed() {
        return {
          schema: SCHEMA,
          seq: 1,
          theme: "light",
          types: [
            { id: "train", label: "Train", color: "#60a5fa" },
            { id: "bus", label: "Bus", color: "#34d399" },
            { id: "plane", label: "Plane", color: "#f59e0b" },
            { id: "car", label: "Car", color: "#a78bfa" },
            { id: "other", label: "Other", color: "#94a3b8" },
          ],
          places: [],
          events: [],
        };
      }
      // Forward-only, one-time migrations. v1 is the current baseline, so there is
      // nothing to upgrade yet. When the persisted shape next changes, bump SCHEMA and
      // add a step here; never remove a step (a user may jump several versions at once):
      //
      //   if(s.schema<2){ (s.places||[]).forEach(p=>{ if(p.foo===undefined) p.foo=…; }); }
      //
      // This is pre-1.0 alpha, so unversioned data isn't supported: it's just stamped v1.
      function migrate(s) {
        s.schema = SCHEMA;
        return s;
      }
      let state = seed();
      let nextId = 1;
      const STORE_KEY = "tp";
      // one client-side id counter, persisted in state (so it rides along in the backup).
      // ids are issued 'ev'+n for events and 'pl'+n for places, both drawing from it.
      function reseed(s) {
        nextId = s.seq || 1;
      }
      function load() {
        try {
          const r = localStorage.getItem(STORE_KEY);
          if (r) return migrate(JSON.parse(r));
        } catch (e) {
          /* corrupt or unavailable storage: fall back to a fresh seed */
        }
        return seed();
      }
      function save() {
        try {
          state.seq = nextId;
          localStorage.setItem(STORE_KEY, JSON.stringify(state));
        } catch (e) {
          /* private mode / quota: keep working in-memory this session */
        }
      }

      /* ===== helpers ===== */
      const $ = (s) => document.querySelector(s);
      const toMin = (t) => {
        const [h, m] = t.split(":").map(Number);
        return h * 60 + m;
      };
      const esc = (s) =>
        (s || "").replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      const typeOf = (id) =>
        state.types.find((t) => t.id === id) || {
          label: "—",
          color: "#94a3b8",
        };
      const placeOf = (id) =>
        state.places.find((p) => p.id === id) || { label: "—" };
      const evsOf = (pid) => state.events.filter((e) => e.placeId === pid);
      const shownPlaces = () => state.places.filter((p) => p.shown);
      function hexA(hex, a) {
        let h = hex.replace("#", "");
        if (h.length === 3)
          h = h
            .split("")
            .map((c) => c + c)
            .join("");
        const n = parseInt(h, 16);
        return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
      }
      // only a valid hex literal is ever interpolated into inline style (guards an imported backup)
      const safeHex = (c) =>
        /^#[0-9a-f]{3,6}$/i.test(c || "") ? c : "#94a3b8";

      function packColumns(evs) {
        const items = evs
          .map((e) => {
            const s = toMin(e.start);
            const end = e.end ? Math.max(toMin(e.end), s + 18) : s + 18;
            return { e, s, end };
          })
          .sort((a, b) => a.s - b.s || a.end - b.end);
        const clusters = [];
        let cur = [],
          ce = -1;
        for (const it of items) {
          if (cur.length && it.s >= ce) {
            clusters.push(cur);
            cur = [];
            ce = -1;
          }
          cur.push(it);
          ce = Math.max(ce, it.end);
        }
        if (cur.length) clusters.push(cur);
        const out = [];
        for (const cl of clusters) {
          const ends = [];
          cl.forEach((it) => {
            let c = ends.findIndex((e) => it.s >= e);
            if (c === -1) {
              c = ends.length;
              ends.push(it.end);
            } else ends[c] = it.end;
            it.col = c;
          });
          cl.forEach((it) => out.push({ ...it, cols: ends.length }));
        }
        return out;
      }
      function colHTML(evs) {
        let h = "";
        for (const it of packColumns(evs)) {
          const e = it.e,
            ty = typeOf(e.typeId),
            c = safeHex(ty.color),
            s = it.s,
            point = !e.end,
            end = e.end ? toMin(e.end) : s;
          const ht = point ? 22 : Math.max((end - s) * ppm, 26),
            short = !point && ht < 46,
            w = 100 / it.cols,
            left = it.col * w;
          const tt = e.end ? `${e.start}–${e.end}` : e.start;
          h += `<div class="ev ${point ? "point" : ""} ${short ? "short" : ""}" data-id="${e.id}"
      style="top:${s * ppm + PAD}px;height:${ht}px;left:calc(${left}% + ${it.col ? 3 : 0}px);width:calc(${w}% - ${it.cols > 1 ? 6 : 0}px);
      background:${hexA(c, 0.16)};border-color:${hexA(c, 0.55)};border-left-color:${c}">
      <div class="t">${tt}</div><div class="n">${esc(e.name)}</div>
      ${!short && !point && e.note ? `<div class="note">${esc(e.note)}</div>` : ""}</div>`;
        }
        return h;
      }
      const railHTML = () => {
        let h = "";
        for (let k = 0; k <= 24; k++)
          h += `<div class="hr" style="top:${k * 60 * ppm + PAD}px">${String(k % 24).padStart(2, "0")}:00</div>`;
        for (let k = 0; k < 24; k++)
          h += `<div class="hr half" style="top:${(k * 60 + 30) * ppm + PAD}px">${String(k).padStart(2, "0")}:30</div>`;
        return h;
      };
      const nowTop = () => {
        const n = new Date();
        return (n.getHours() * 60 + n.getMinutes()) * ppm + PAD;
      };
      const nowLine = () =>
        `<div class="nowline" style="top:${nowTop()}px"></div>`;
      // nudge the already-rendered now-lines without a full re-render (so scroll isn't disturbed)
      function tickNow() {
        const top = nowTop();
        document.querySelectorAll(".nowline").forEach((el) => {
          el.style.top = top + "px";
        });
      }

      /* ===== render ===== */
      function render(firstPaint) {
        document.body.dataset.theme = state.theme;

        // chips
        $("#chips").innerHTML =
          state.places
            .map(
              (p) =>
                `<button class="chip ${p.shown ? "on" : ""}" data-place="${p.id}"><span class="ck">✓</span>${esc(p.label)}</button>`,
            )
            .join("") +
          `<button class="chip add" id="chipAdd">+ Place</button>`;

        const H = DAY_MIN * ppm + PAD * 2,
          v = $("#view"),
          shown = shownPlaces();

        if (!state.places.length) {
          v.innerHTML = `<div class="empty">No places yet.<br>Tap “+ Place” to add an airport or city.</div>`;
          return;
        }
        if (!shown.length) {
          v.innerHTML = `<div class="empty">Tick a place above to see and compare its times.</div>`;
          return;
        }

        const n = shown.length;
        let g = `<div class="cwrap"><div class="cgrid" style="grid-template-columns:var(--rail) repeat(${n},minmax(150px,1fr))">`;
        g += `<div class="chead ctime">Time</div>`;
        g += shown
          .map(
            (p) =>
              `<div class="chead" data-place="${p.id}">${esc(p.label)}</div>`,
          )
          .join("");
        g += `<div class="crail" style="height:${H}px">${railHTML()}</div>`;
        g += shown
          .map(
            (p) =>
              `<div class="track" style="height:${H}px">${colHTML(evsOf(p.id))}${nowLine()}</div>`,
          )
          .join("");
        g += `</div></div>`;
        v.innerHTML = g;

        // only centre on "now" for the initial paint; later renders (after an edit)
        // must leave the user's scroll position alone.
        if (firstPaint) {
          const now = new Date();
          $("#scroll").scrollTop = Math.max(
            0,
            (now.getHours() * 60 + now.getMinutes() - 180) * ppm + PAD,
          );
        }
      }

      /* ===== sheets ===== */
      function closeSheets() {
        $("#scrim").classList.remove("open");
        ["evSheet", "placeSheet", "setSheet", "shareSheet"].forEach((id) =>
          $("#" + id).classList.remove("open"),
        );
      }
      function openSheet(id) {
        $("#scrim").classList.add("open");
        $("#" + id).classList.add("open");
      }
      $("#scrim").onclick = closeSheets;
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSheets();
      });

      /* chips: toggle show/hide, or add */
      $("#chips").onclick = (e) => {
        if (e.target.closest("#chipAdd")) {
          openPlace(null);
          return;
        }
        const chip = e.target.closest(".chip[data-place]");
        if (!chip) return;
        const p = placeOf(chip.dataset.place);
        p.shown = !p.shown;
        save();
        render();
      };

      /* entry */
      let editId = null;
      const opts = (arr, sel) =>
        arr
          .map(
            (o) =>
              `<option value="${o.id}" ${o.id === sel ? "selected" : ""}>${esc(o.label)}</option>`,
          )
          .join("");
      function openEntry(ev) {
        editId = ev ? ev.id : null;
        $("#evTitle").textContent = ev ? "Edit entry" : "Add entry";
        $("#evDelete").style.display = ev ? "block" : "none";
        const defPlace = ev
          ? ev.placeId
          : shownPlaces()[0]?.id || state.places[0]?.id;
        $("#fType").innerHTML = opts(
          state.types,
          ev ? ev.typeId : state.types[0]?.id,
        );
        $("#fPlace").innerHTML = opts(state.places, defPlace);
        $("#fName").value = ev ? ev.name : "";
        $("#fStart").value = ev ? ev.start : "";
        $("#fEnd").value = ev ? ev.end || "" : "";
        $("#fNote").value = ev ? ev.note || "" : "";
        openSheet("evSheet");
      }
      $("#addBtn").onclick = () => {
        if (!state.places.length) {
          alert("Add a place first.");
          return;
        }
        openEntry(null);
      };
      $("#evCancel").onclick = closeSheets;
      $("#view").onclick = (e) => {
        const card = e.target.closest(".ev");
        if (card) {
          openEntry(state.events.find((x) => x.id === card.dataset.id));
          return;
        }
        const head = e.target.closest(".chead[data-place]");
        if (head) openPlace(head.dataset.place);
      };
      $("#evSave").onclick = () => {
        const name = $("#fName").value.trim(),
          start = $("#fStart").value;
        if (!name || !start) {
          alert("A name and a departure time are needed.");
          return;
        }
        const d = {
          name,
          typeId: $("#fType").value,
          placeId: $("#fPlace").value,
          start,
          end: $("#fEnd").value || "",
          note: $("#fNote").value.trim(),
        };
        if (editId)
          Object.assign(
            state.events.find((e) => e.id === editId),
            d,
          );
        else state.events.push({ id: "ev" + nextId++, ...d });
        placeOf(d.placeId).shown = true; // make sure its column is visible
        save();
        closeSheets();
        render();
      };
      $("#evDelete").onclick = () => {
        state.events = state.events.filter((e) => e.id !== editId);
        save();
        closeSheets();
        render();
      };

      /* place */
      let placeEdit = null;
      function openPlace(idOrNull) {
        placeEdit = idOrNull;
        const p = idOrNull ? placeOf(idOrNull) : null;
        $("#placeTitle").textContent = p ? "Edit place" : "Add place";
        $("#pLabel").value = p ? p.label : "";
        $("#placeDelete").style.display = p ? "block" : "none";
        openSheet("placeSheet");
      }
      $("#placeCancel").onclick = closeSheets;
      $("#placeSave").onclick = () => {
        const label = $("#pLabel").value.trim();
        if (!label) {
          alert("Give the place a name.");
          return;
        }
        if (placeEdit) {
          placeOf(placeEdit).label = label;
        } else {
          state.places.push({ id: "pl" + nextId++, label, shown: true });
        }
        save();
        closeSheets();
        render();
      };
      $("#placeDelete").onclick = () => {
        const k = evsOf(placeEdit).length;
        if (
          !confirm(
            `Delete this place${k ? ` and its ${k} ${k === 1 ? "entry" : "entries"}` : ""}?`,
          )
        )
          return;
        state.events = state.events.filter((e) => e.placeId !== placeEdit);
        state.places = state.places.filter((p) => p.id !== placeEdit);
        save();
        closeSheets();
        render();
      };

      /* settings */
      let typeDraft = [],
        typeSeq = 0;
      function renderTypeRows() {
        $("#typeList").innerHTML = typeDraft
          .map(
            (t, i) => `<div class="typerow" data-i="${i}">
    <input type="color" value="${t.color}"><input type="text" value="${esc(t.label)}" placeholder="Type name">
    <button class="rm" aria-label="Remove">×</button></div>`,
          )
          .join("");
        $("#typeList")
          .querySelectorAll(".typerow")
          .forEach((row) => {
            const i = +row.dataset.i;
            row.querySelector("input[type=color]").oninput = (e) =>
              (typeDraft[i].color = e.target.value);
            row.querySelector("input[type=text]").oninput = (e) =>
              (typeDraft[i].label = e.target.value);
            row.querySelector(".rm").onclick = () => {
              typeDraft.splice(i, 1);
              renderTypeRows();
            };
          });
      }
      $("#settingsBtn").onclick = () => {
        $("#themeSeg")
          .querySelectorAll("button")
          .forEach((b) =>
            b.classList.toggle("on", b.dataset.theme === state.theme),
          );
        typeDraft = state.types.map((t) => ({ ...t }));
        renderTypeRows();
        openSheet("setSheet");
      };
      $("#themeSeg")
        .querySelectorAll("button")
        .forEach(
          (b) =>
            (b.onclick = () => {
              state.theme = b.dataset.theme;
              document.body.dataset.theme = state.theme;
              $("#themeSeg")
                .querySelectorAll("button")
                .forEach((x) => x.classList.toggle("on", x === b));
              save();
            }),
        );
      $("#addType").onclick = () => {
        typeDraft.push({ id: "new_" + ++typeSeq, label: "", color: "#38bdf8" });
        renderTypeRows();
      };
      $("#setDone").onclick = () => {
        state.types = typeDraft
          .filter((t) => t.label.trim())
          .map((t) => ({ id: t.id, label: t.label.trim(), color: t.color }));
        save();
        closeSheets();
        render();
      };

      /* share */
      function buildShare() {
        const list = shownPlaces().length ? shownPlaces() : state.places;
        const out = [];
        list.forEach((p) => {
          out.push(p.label.toUpperCase());
          const evs = evsOf(p.id)
            .slice()
            .sort((a, b) => toMin(a.start) - toMin(b.start));
          if (!evs.length) out.push("  (nothing yet)");
          evs.forEach((e) => {
            const t = e.end ? `${e.start}–${e.end}` : e.start;
            out.push(`  ${t}  ${e.name}${e.note ? `  (${e.note})` : ""}`);
          });
          out.push("");
        });
        return out.join("\n").trim();
      }
      $("#shareBtn").onclick = () => {
        $("#shareText").value = buildShare();
        openSheet("shareSheet");
      };
      $("#shareCancel").onclick = closeSheets;
      $("#copyBtn").onclick = () => {
        const ta = $("#shareText"),
          btn = $("#copyBtn");
        ta.select();
        try {
          navigator.clipboard.writeText(ta.value);
        } catch {
          try {
            document.execCommand("copy");
          } catch {}
        }
        btn.textContent = "Copied";
        setTimeout(() => {
          btn.textContent = "Copy";
        }, 1400);
      };

      /* backup */
      $("#exportBtn").onclick = () => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(
          new Blob([JSON.stringify(state, null, 2)], {
            type: "application/json",
          }),
        );
        a.download = "travel-planner-backup.json";
        a.click();
      };
      $("#importBtn").onclick = () => $("#fileInput").click();
      $("#fileInput").onchange = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = () => {
          try {
            const d = JSON.parse(r.result);
            if (!(d.events && d.places && d.types)) {
              alert("That file does not look like a backup.");
              return;
            }
            state = migrate(d);
            reseed(state);
            save();
            closeSheets();
            render();
          } catch {
            alert("Could not read that file.");
          }
        };
        r.readAsText(f);
      };

      state = load();
      reseed(state);
      render(true);
      setInterval(tickNow, 60000); // keep the "now" line drifting down through the day

      // best-effort: ask the browser not to evict our data under storage pressure
      if (navigator.storage?.persist)
        navigator.storage.persist().catch(() => {});

      // offline app shell: register the service worker scoped to this tool only
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () =>
          navigator.serviceWorker.register("./sw.js").catch(() => {}),
        );
      }
    </script>
  </body>
</html>
